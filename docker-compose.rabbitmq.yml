name: ingressinhos-mensageria

services:
  rabbitmq:
    image: rabbitmq:management
    container_name: ingressinhos-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?Set RABBITMQ_USER in .env}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - ingressinhos-network

volumes:
  rabbitmq-data:

networks:
  ingressinhos-network:
    external: true
