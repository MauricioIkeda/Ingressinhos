events {
    worker_connections 1024;
}

http {
    server {
        listen 8080;
        server_name ~^auth\..+$;

        location / {
            add_header X-Ingressinhos-Upstream sentinel-auth-frontend always;
            proxy_pass http://sentinel-auth-frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    server {
        listen 8080;
        server_name ~^auth-api\..+$;

        location / {
            add_header X-Ingressinhos-Upstream sentinel-auth-api always;
            proxy_pass http://sentinel-auth-api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    server {
        listen 8080;
        server_name ~^payment\..+$;

        location / {
            add_header X-Ingressinhos-Upstream payment-api always;
            proxy_pass http://payment-api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    server {
        listen 8080 default_server;
        server_name _;

        # Compatibilidade com o roteamento antigo por path.
        location /auth/ {
            proxy_pass http://sentinel-auth-api:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /payment/ {
            proxy_pass http://payment-api:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /mock/ {
            proxy_pass http://payment-api:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            add_header X-Ingressinhos-Upstream ingressinhos-api always;
            proxy_pass http://ingressinhos-api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
