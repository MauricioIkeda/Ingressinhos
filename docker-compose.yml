services:
  ingressinhos-postgres-primary:
    image: bitnami/postgresql:latest
    container_name: ingressinhos-postgres-primary
    restart: unless-stopped
    ports:
      - "15432:5432"
    environment:
      ALLOW_EMPTY_PASSWORD: "no"
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRESQL_DATABASE: "IngressinhosDb"
      POSTGRESQL_REPLICATION_MODE: "master"
      POSTGRESQL_REPLICATION_USER: "replicator"
      POSTGRESQL_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:?Set POSTGRES_REPLICATION_PASSWORD in .env}
    volumes:
      - ingressinhos-postgres-primary-data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U postgres -d IngressinhosDb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ingressinhos-network

  ingressinhos-postgres-replica:
    image: bitnami/postgresql:latest
    container_name: ingressinhos-postgres-replica
    restart: unless-stopped
    depends_on:
      ingressinhos-postgres-primary:
        condition: service_healthy
    ports:
      - "15433:5432"
    environment:
      ALLOW_EMPTY_PASSWORD: "no"
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRESQL_REPLICATION_MODE: "slave"
      POSTGRESQL_MASTER_HOST: "ingressinhos-postgres-primary"
      POSTGRESQL_MASTER_PORT_NUMBER: "5432"
      POSTGRESQL_REPLICATION_USER: "replicator"
      POSTGRESQL_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:?Set POSTGRES_REPLICATION_PASSWORD in .env}
    volumes:
      - ingressinhos-postgres-replica-data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U postgres -d IngressinhosDb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - ingressinhos-network

  app-postgres:
    image: bitnami/postgresql:latest
    container_name: app-postgres
    restart: unless-stopped
    ports:
      - "15434:5432"
    environment:
      ALLOW_EMPTY_PASSWORD: "no"
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - app-postgres-data:/bitnami/postgresql
      - ./docker/postgres/init-app-databases.sh:/docker-entrypoint-initdb.d/init-app-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ingressinhos-network

  rabbitmq:
    image: rabbitmq:management
    container_name: ingressinhos-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?Set RABBITMQ_USER in .env}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ingressinhos-network

  ingressinhos-mongodb:
    image: mongo:7
    container_name: ingressinhos-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:?Set MONGO_USER in .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?Set MONGO_PASSWORD in .env}
      MONGO_INITDB_DATABASE: IngressinhosReadDb
    volumes:
      - ingressinhos-mongodb-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ingressinhos-network

  sentinel-auth-api:
    build:
      context: ../SentinelAuth/SentinelAuthBackEnd
      dockerfile: SentinelAuth.API/Dockerfile
    image: ingressinhos/sentinel-auth-api:dev
    container_name: ingressinhos-sentinel-auth-api
    restart: unless-stopped
    ports:
      - "5254:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${SENTINEL_AUTH_DB_CONNECTION:?Set SENTINEL_AUTH_DB_CONNECTION in .env}
      Jwt__Issuer: SentinelAuth
      Jwt__SecretKey: ${SENTINEL_AUTH_JWT_SECRET:?Set SENTINEL_AUTH_JWT_SECRET in .env}
      Seed__Ingressinhos__Enabled: "true"
      Seed__Ingressinhos__ClientSecret: ${SENTINEL_AUTH_INGRESSINHOS_CLIENT_SECRET:?Set SENTINEL_AUTH_INGRESSINHOS_CLIENT_SECRET in .env}
      Bootstrap__SuperAdmin__Enabled: ${SENTINEL_BOOTSTRAP_SUPERADMIN_ENABLED:-true}
      Bootstrap__SuperAdmin__Email: ${SENTINEL_BOOTSTRAP_SUPERADMIN_EMAIL:?Set SENTINEL_BOOTSTRAP_SUPERADMIN_EMAIL in .env}
      Bootstrap__SuperAdmin__Password: ${SENTINEL_BOOTSTRAP_SUPERADMIN_PASSWORD:?Set SENTINEL_BOOTSTRAP_SUPERADMIN_PASSWORD in .env}
      Bootstrap__SuperAdmin__Name: ${SENTINEL_BOOTSTRAP_SUPERADMIN_NAME:-Sentinel SuperAdmin}
      Cors__AllowedOrigins__0: http://localhost:5173
      Cors__AllowedOrigins__1: http://127.0.0.1:5173
      Cors__AllowedOrigins__2: http://10.0.2.2:5173
      Cors__AllowedOrigins__3: ${SENTINEL_AUTH_FRONTEND_PUBLIC_URL:?Set SENTINEL_AUTH_FRONTEND_PUBLIC_URL in .env}
      Cors__AllowedOrigins__4: ${INGRESSINHOS_PUBLIC_URL:?Set INGRESSINHOS_PUBLIC_URL in .env}
    depends_on:
      app-postgres:
        condition: service_healthy
    networks:
      - ingressinhos-network

  sentinel-auth-frontend:
    build:
      context: ../SentinelAuth/SentinelAuthFrontEnd
      dockerfile: Dockerfile
      args:
        VITE_SENTINEL_AUTH_API_URL: ${SENTINEL_AUTH_API_PUBLIC_URL:?Set SENTINEL_AUTH_API_PUBLIC_URL in .env}
        VITE_DEFAULT_CLIENT_ID: ingressinhos-api
        VITE_DEFAULT_REDIRECT_URI: ingressinhos://auth/callback
        VITE_DEFAULT_STATE: ""
    image: ingressinhos/sentinel-auth-frontend:dev
    container_name: ingressinhos-sentinel-auth-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - sentinel-auth-api
    networks:
      - ingressinhos-network

  payment-api:
    build:
      context: .
      dockerfile: Payment.Api/Dockerfile
    image: ingressinhos/payment-api:dev
    container_name: ingressinhos-payment-api
    restart: unless-stopped
    ports:
      - "5071:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PaymentConnection: ${PAYMENT_DB_CONNECTION:?Set PAYMENT_DB_CONNECTION in .env}
      Messaging__RabbitMq__HostName: rabbitmq
      Messaging__RabbitMq__Port: 5672
      Messaging__RabbitMq__UserName: ${RABBITMQ_USER:?Set RABBITMQ_USER in .env}
      Messaging__RabbitMq__Password: ${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}
      MockCheckout__PublicBaseUrl: ${PAYMENT_PUBLIC_URL:?Set PAYMENT_PUBLIC_URL in .env}
    depends_on:
      app-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ingressinhos-network

  ingressinhos-api:
    build:
      context: .
      dockerfile: Ingressinhos.API/Dockerfile
    image: ingressinhos/ingressinhos-api:dev
    container_name: ingressinhos-api
    restart: unless-stopped
    ports:
      - "5202:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${INGRESSINHOS_DB_CONNECTION:?Set INGRESSINHOS_DB_CONNECTION in .env}
      ConnectionStrings__ReadConnection: ${INGRESSINHOS_READ_DB_CONNECTION:?Set INGRESSINHOS_READ_DB_CONNECTION in .env}
      Mongo__ConnectionString: ${INGRESSINHOS_MONGO_CONNECTION:?Set INGRESSINHOS_MONGO_CONNECTION in .env}
      Mongo__Database: IngressinhosReadDb
      Mongo__TicketCollection: clientTickets
      Messaging__RabbitMq__HostName: rabbitmq
      Messaging__RabbitMq__Port: 5672
      Messaging__RabbitMq__UserName: ${RABBITMQ_USER:?Set RABBITMQ_USER in .env}
      Messaging__RabbitMq__Password: ${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}
      AppSettings__SecretKey: ${SENTINEL_AUTH_JWT_SECRET:?Set SENTINEL_AUTH_JWT_SECRET in .env}
      AppSettings__Issuer: SentinelAuth
      AppSettings__Audience: Ingressinhos.API
      SentinelAuthClient__BaseUrl: http://sentinel-auth-api:8080
      SentinelAuthClient__ClientId: ingressinhos-api
      SentinelAuthClient__ClientSecret: ${SENTINEL_AUTH_INGRESSINHOS_CLIENT_SECRET:?Set SENTINEL_AUTH_INGRESSINHOS_CLIENT_SECRET in .env}
      SentinelAuthClient__ApplicationClientId: ${SENTINEL_AUTH_INGRESSINHOS_APPLICATION_CLIENT_ID:-1}
      SentinelAuthClient__AdminRoleId: ${SENTINEL_AUTH_INGRESSINHOS_ADMIN_ROLE_ID:-1}
      SentinelAuthClient__SellerRoleId: ${SENTINEL_AUTH_INGRESSINHOS_SELLER_ROLE_ID:-2}
      SentinelAuthClient__ClientRoleId: ${SENTINEL_AUTH_INGRESSINHOS_CLIENT_ROLE_ID:-3}
      PaymentApi__BaseUrl: http://payment-api:8080
    depends_on:
      ingressinhos-postgres-primary:
        condition: service_healthy
      ingressinhos-postgres-replica:
        condition: service_healthy
      ingressinhos-mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      sentinel-auth-api:
        condition: service_started
      payment-api:
        condition: service_started
    networks:
      - ingressinhos-network

  ingressinhos-worker:
    build:
      context: .
      dockerfile: Ingressinhos.Worker/Dockerfile
    image: ingressinhos/ingressinhos-worker:dev
    container_name: ingressinhos-worker
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: ${INGRESSINHOS_DB_CONNECTION:?Set INGRESSINHOS_DB_CONNECTION in .env}
      Mongo__ConnectionString: ${INGRESSINHOS_MONGO_CONNECTION:?Set INGRESSINHOS_MONGO_CONNECTION in .env}
      Mongo__Database: IngressinhosReadDb
      Mongo__TicketCollection: clientTickets
      Messaging__RabbitMq__HostName: rabbitmq
      Messaging__RabbitMq__Port: 5672
      Messaging__RabbitMq__UserName: ${RABBITMQ_USER:?Set RABBITMQ_USER in .env}
      Messaging__RabbitMq__Password: ${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}
      TicketReadModelBackfill__EnabledOnStartup: "false"
      TicketReadModelBackfill__BatchSize: 100
    depends_on:
      ingressinhos-postgres-primary:
        condition: service_healthy
      ingressinhos-mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ingressinhos-network

  payment-worker:
    build:
      context: .
      dockerfile: Payment.Worker/Dockerfile
    image: ingressinhos/payment-worker:dev
    container_name: ingressinhos-payment-worker
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__PaymentConnection: ${PAYMENT_DB_CONNECTION:?Set PAYMENT_DB_CONNECTION in .env}
      Messaging__RabbitMq__HostName: rabbitmq
      Messaging__RabbitMq__Port: 5672
      Messaging__RabbitMq__UserName: ${RABBITMQ_USER:?Set RABBITMQ_USER in .env}
      Messaging__RabbitMq__Password: ${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}
      PaymentExpiration__CancelAfterMinutes: 30
    depends_on:
      app-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ingressinhos-network

  generic-api:
    build:
      context: .
      dockerfile: Generic.Api/Dockerfile
    image: ingressinhos/generic-api:dev
    container_name: ingressinhos-generic-api
    restart: unless-stopped
    ports:
      - "5110:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    networks:
      - ingressinhos-network

  generic-worker:
    build:
      context: .
      dockerfile: Generic.Worker/Dockerfile
    image: ingressinhos/generic-worker:dev
    container_name: ingressinhos-generic-worker
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: Development
    networks:
      - ingressinhos-network

  nginx-proxy:
    image: nginx:alpine
    container_name: ingressinhos-nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - sentinel-auth-frontend
      - sentinel-auth-api
      - payment-api
      - ingressinhos-api
    networks:
      - ingressinhos-network

volumes:
  ingressinhos-postgres-primary-data:
  ingressinhos-postgres-replica-data:
  app-postgres-data:
  rabbitmq-data:
  ingressinhos-mongodb-data:

networks:
  ingressinhos-network:
    name: ingressinhos-network
