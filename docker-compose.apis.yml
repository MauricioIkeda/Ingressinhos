name: ingressinhos-apis

services:
  sentinel-auth-api:
    build:
      context: ../SentinelAuth/SentinelAuthBackEnd
      dockerfile: SentinelAuth.API/Dockerfile
    image: ingressinhos/sentinel-auth-api:dev
    container_name: ingressinhos-sentinel-auth-api
    restart: unless-stopped
    ports:
      - "5254:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${SENTINEL_AUTH_DB_CONNECTION:?Set SENTINEL_AUTH_DB_CONNECTION in .env}
      Jwt__Issuer: SentinelAuth
      Jwt__SecretKey: ${SENTINEL_AUTH_JWT_SECRET:?Set SENTINEL_AUTH_JWT_SECRET in .env}
      Seed__Ingressinhos__Enabled: "true"
      Seed__Ingressinhos__ClientSecret: ${SENTINEL_AUTH_INGRESSINHOS_CLIENT_SECRET:?Set SENTINEL_AUTH_INGRESSINHOS_CLIENT_SECRET in .env}
      Bootstrap__SuperAdmin__Enabled: ${SENTINEL_BOOTSTRAP_SUPERADMIN_ENABLED:-true}
      Bootstrap__SuperAdmin__Email: ${SENTINEL_BOOTSTRAP_SUPERADMIN_EMAIL:?Set SENTINEL_BOOTSTRAP_SUPERADMIN_EMAIL in .env}
      Bootstrap__SuperAdmin__Password: ${SENTINEL_BOOTSTRAP_SUPERADMIN_PASSWORD:?Set SENTINEL_BOOTSTRAP_SUPERADMIN_PASSWORD in .env}
      Bootstrap__SuperAdmin__Name: ${SENTINEL_BOOTSTRAP_SUPERADMIN_NAME:-Sentinel SuperAdmin}
      Cors__AllowedOrigins__0: http://localhost:5173
      Cors__AllowedOrigins__1: http://127.0.0.1:5173
      Cors__AllowedOrigins__2: http://10.0.2.2:5173
      Cors__AllowedOrigins__3: ${SENTINEL_AUTH_FRONTEND_PUBLIC_URL:?Set SENTINEL_AUTH_FRONTEND_PUBLIC_URL in .env}
      Cors__AllowedOrigins__4: ${INGRESSINHOS_PUBLIC_URL:?Set INGRESSINHOS_PUBLIC_URL in .env}
    networks:
      - ingressinhos-network

  sentinel-auth-frontend:
    build:
      context: ../SentinelAuth/SentinelAuthFrontEnd
      dockerfile: Dockerfile
      args:
        VITE_SENTINEL_AUTH_API_URL: ${SENTINEL_AUTH_API_PUBLIC_URL:?Set SENTINEL_AUTH_API_PUBLIC_URL in .env}
        VITE_DEFAULT_CLIENT_ID: ingressinhos-api
        VITE_DEFAULT_REDIRECT_URI: ingressinhos://auth/callback
        VITE_DEFAULT_STATE: ""
    image: ingressinhos/sentinel-auth-frontend:dev
    container_name: ingressinhos-sentinel-auth-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - ingressinhos-network

  payment-api:
    build:
      context: .
      dockerfile: Payment.Api/Dockerfile
    image: ingressinhos/payment-api:dev
    container_name: ingressinhos-payment-api
    restart: unless-stopped
    ports:
      - "5071:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PaymentConnection: ${PAYMENT_DB_CONNECTION:?Set PAYMENT_DB_CONNECTION in .env}
      Messaging__RabbitMq__HostName: rabbitmq
      Messaging__RabbitMq__Port: 5672
      Messaging__RabbitMq__UserName: ${RABBITMQ_USER:?Set RABBITMQ_USER in .env}
      Messaging__RabbitMq__Password: ${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}
      MockCheckout__PublicBaseUrl: ${PAYMENT_PUBLIC_URL:?Set PAYMENT_PUBLIC_URL in .env}
    networks:
      - ingressinhos-network

  ingressinhos-api:
    build:
      context: .
      dockerfile: Ingressinhos.API/Dockerfile
    image: ingressinhos/ingressinhos-api:dev
    container_name: ingressinhos-api
    restart: unless-stopped
    ports:
      - "5202:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${INGRESSINHOS_DB_CONNECTION:?Set INGRESSINHOS_DB_CONNECTION in .env}
      ConnectionStrings__ReadConnection: ${INGRESSINHOS_READ_DB_CONNECTION:?Set INGRESSINHOS_READ_DB_CONNECTION in .env}
      Mongo__ConnectionString: ${INGRESSINHOS_MONGO_CONNECTION:?Set INGRESSINHOS_MONGO_CONNECTION in .env}
      Mongo__Database: IngressinhosReadDb
      Mongo__TicketCollection: clientTickets
      Messaging__RabbitMq__HostName: rabbitmq
      Messaging__RabbitMq__Port: 5672
      Messaging__RabbitMq__UserName: ${RABBITMQ_USER:?Set RABBITMQ_USER in .env}
      Messaging__RabbitMq__Password: ${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}
      AppSettings__SecretKey: ${SENTINEL_AUTH_JWT_SECRET:?Set SENTINEL_AUTH_JWT_SECRET in .env}
      AppSettings__Issuer: SentinelAuth
      AppSettings__Audience: Ingressinhos.API
      SentinelAuthClient__BaseUrl: http://sentinel-auth-api:8080
      SentinelAuthClient__ClientId: ingressinhos-api
      SentinelAuthClient__ClientSecret: ${SENTINEL_AUTH_INGRESSINHOS_CLIENT_SECRET:?Set SENTINEL_AUTH_INGRESSINHOS_CLIENT_SECRET in .env}
      SentinelAuthClient__ApplicationClientId: 1
      SentinelAuthClient__AdminRoleId: 1
      SentinelAuthClient__SellerRoleId: 2
      SentinelAuthClient__ClientRoleId: 3
      PaymentApi__BaseUrl: http://payment-api:8080
    networks:
      - ingressinhos-network

networks:
  ingressinhos-network:
    external: true

